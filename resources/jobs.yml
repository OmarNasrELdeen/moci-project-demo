resources:
  jobs:
    master_job:
      name: ${var.job_name}
      max_concurrent_runs: 1

      environments:
        - environment_key: default
          spec:
            environment_version: "2"

      tasks:
        - task_key: bronze_stores
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "stores"]

        - task_key: bronze_products
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "products"]

        - task_key: bronze_customers
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "customers"]

        - task_key: bronze_employees
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "employees"]

        - task_key: bronze_orders
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "orders", "--lower-bound", "1", "--upper-bound", "10000"]

        - task_key: bronze_order_items
          environment_key: default
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "order_items", "--lower-bound", "1", "--upper-bound", "10000"]

        - task_key: silver_pipeline
          depends_on:
            - task_key: bronze_stores
            - task_key: bronze_products
            - task_key: bronze_customers
            - task_key: bronze_employees
            - task_key: bronze_orders
            - task_key: bronze_order_items
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline.id}

        - task_key: gold_pipeline
          depends_on:
            - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}

resources:
  jobs:
    master_job:
      name: ${var.job_name}
      max_concurrent_runs: 1

      tasks:
        - task_key: bronze_stores
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "stores"]

        - task_key: bronze_products
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "products"]

        - task_key: bronze_customers
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "customers"]

        - task_key: bronze_employees
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "employees"]

        - task_key: bronze_orders
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "orders"]

        - task_key: bronze_order_items
          spark_python_task:
            python_file: ${workspace.file_path}/jobs/bronze_ingestion_job.py
            parameters: ["--catalog", "${var.catalog}", "--table", "order_items"]

        - task_key: pipeline_stores_silver_gold
          depends_on:
            - task_key: bronze_stores
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_gold_pipeline.id}

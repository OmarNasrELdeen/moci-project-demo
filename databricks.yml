bundle:
  name: moci-project-demo

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name for this target
    default: moci_dev
  silver_pipeline_name:
    description: Silver Lakeflow pipeline name
    default: moci_dev_silver
  gold_pipeline_name:
    description: Gold Lakeflow pipeline name
    default: moci_dev_gold
  job_name:
    description: Master workflow job name
    default: moci_dev_master

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: moci_dev
      silver_pipeline_name: moci_dev_silver
      gold_pipeline_name: moci_dev_gold
      job_name: moci_dev_master

  prod:
    mode: production
    variables:
      catalog: moci_prod
      silver_pipeline_name: moci_prod_silver
      gold_pipeline_name: moci_prod_gold
      job_name: moci_prod_master
